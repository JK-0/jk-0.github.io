<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Jignesh Kotadiya — AI/LLM, Software &amp; DevOps Engineer">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a1244"/>
      <stop offset="1" stop-color="#0c0513"/>
    </linearGradient>
    <linearGradient id="og-ac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c084f5"/>
      <stop offset="1" stop-color="#8a4fd6"/>
    </linearGradient>
    <style>
      .f  { font-family: 'DejaVu Sans', sans-serif; }
      .fb { font-family: 'DejaVu Sans', sans-serif; font-weight: bold; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect x="0" y="0" width="14" height="630" fill="url(#og-ac)"/>

  <!-- decorative agent graph (top right) -->
  <g stroke="#c084f5" stroke-opacity="0.18" stroke-width="3" fill="none">
    <circle cx="1010" cy="150" r="30"/>
    <circle cx="1110" cy="250" r="30"/>
    <circle cx="980" cy="300" r="30"/>
    <line x1="1010" y1="150" x2="1110" y2="250"/>
    <line x1="1010" y1="150" x2="980" y2="300"/>
    <line x1="1110" y1="250" x2="980" y2="300"/>
  </g>

  <text class="fb" x="72" y="250" font-size="78" fill="#ffffff">Jignesh Kotadiya</text>
  <text class="fb" x="74" y="318" font-size="40" fill="#c084f5">AI/LLM · Software · DevOps Engineer</text>
  <text class="f"  x="74" y="378" font-size="27" fill="#cabbe2">AI Agents · RAG · Python (Django / FastAPI) · AWS · Docker · K8s</text>

  <g transform="translate(74,470)">
    <rect x="0" y="0" width="30" height="30" rx="7" fill="url(#og-ac)"/>
    <text class="fb" x="46" y="23" font-size="26" fill="#e7def5">7+ years · Remote · AWS Certified DevOps</text>
  </g>

  <text class="fb" x="74" y="560" font-size="28" fill="#9f86c0">jk-0.github.io</text>
</svg>
